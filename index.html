<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Battle Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="classic-aura">
    <div id="home-screen" class="home-container">
        <h1 class="main-title">DICE<span>BATTLE</span></h1>
        <div class="login-card glass">
            <input type="text" id="nickname-input" placeholder="Warrior name..." class="glass-input">
            <button onclick="enterArena()" class="enter-btn">🚀 ENTER ARENA</button>
        </div>
        <div class="footer-credit">
            <p class="server-status"><span class="dot"></span> Global Server Online</p>
            <p class="dev-name">Developed by Kaushal Kotian</p>
        </div>
    </div>

    <nav id="game-nav" class="nav-bar glass" style="display: none;">
        <button class="nav-btn active" onclick="showTab('arena')">⚔️ Arena</button>
        <button class="nav-btn" onclick="showTab('vault')">✨ Vault</button>
        <button class="nav-btn" onclick="showTab('hall')">🏆 Hall</button>
    </nav>

    <main id="game-screen" style="display: none;">
        
        <section id="tab-arena" class="tab-content active">
            <p class="player-tag"><span id="display-username">Warrior</span> LVL <span id="lvl-num">1</span></p>
            <div class="battle-arena">
                <div class="player-box glass">
                    <div class="hp-wrapper"><div id="p1-hp" class="hp-bar" style="width: 100%;"></div></div>
                    <img src="red-dice.png" id="dice1" class="dice-img" alt="1">
                    <p>YOU</p>
                </div>
                <div class="vs-divider">VS</div>
                <div class="player-box glass">
                    <div class="hp-wrapper"><div id="p2-hp" class="hp-bar" style="width: 100%;"></div></div>
                    <img src="green-dice.png" id="dice2" class="dice-img" alt="1">
                    <p id="cpu-label">CPU</p>
                </div>
            </div>
            <div class="action-zone glass">
                <input type="number" id="bet-input" value="10" class="glass-input">
                <div class="btn-group">
                    <button onclick="startBattle('std')" class="btn-battle std-premium">🎲 Standard</button>
                    <button onclick="startBattle('bsk')" class="btn-battle bsk-premium">⚡ Berserk</button>
                </div>
            </div>
        </section>

        <section id="tab-vault" class="tab-content">
            <div class="daily-reward-card glass">
                <h3>🎁 Daily Bonus</h3>
                <button class="up-btn" onclick="claimDaily()">CLAIM REWARD</button>
            </div>
            <h3 class="section-title">✨ AURA SELECTOR</h3>
            <div class="aura-container glass">
                <button class="aura-btn active" onclick="setAura('classic')">🌑 Classic</button>
                <button class="aura-btn" onclick="setAura('cyber')">🧬 Cyber</button>
            </div>
            <h3 class="section-title">🛒 SHOP</h3>
            <div class="shop-list glass">
                <div class="upgrade-row"><span>🧪 Potion</span><button class="up-btn">200c</button></div>
            </div>
        </section>

    </main>

    <div id="wallet" class="wallet-bar glass" style="display: none;">
        <span>💰 <span id="coins-game">1000</span></span>
        <span>🟡 <span id="tokens-game">0</span></span>
        <span>✨ <span id="mult-display">1</span>x</span>
    </div>

    <script src="main.js"></script>
</body>
</html>
