<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Battle Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="classic-aura">

    <div id="home-screen" class="home-container">
        <div class="floating-dice">🎲</div>
        <h1 class="main-title">DICE<span>BATTLE</span></h1>
        <p class="subtitle">ELITE ARENA</p>
        
        <div class="login-card glass">
            <input type="text" id="nickname-input" placeholder="Warrior name..." class="glass-input">
            <button onclick="enterArena()" class="enter-btn">🚀 ENTER ARENA</button>
        </div>

        <div class="footer-credit">
            <p class="server-status"><span class="dot"></span> Global Server Online</p>
            <p class="dev-name">Developed by Kaushal Kotian</p>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <nav class="nav-bar glass">
            <button class="nav-btn active" onclick="showTab('arena')">⚔️ Arena</button>
            <button class="nav-btn" onclick="showTab('vault')">✨ Vault</button>
            <button class="nav-btn" onclick="showTab('hall')">🏆 Hall</button>
        </nav>

        <section id="tab-arena" class="tab-content active">
            <p class="player-tag"><span id="display-username">Warrior</span> LVL <span id="lvl-num">27</span></p>
            <div class="battle-arena">
                <div class="player-box glass">
                    <div class="hp-wrapper"><div id="p1-hp" class="hp-bar" style="width: 100%;"></div></div>
                    <img src="red-dice-1.png" id="dice1" class="dice-img">
                    <p>YOU</p>
                </div>
                <div class="vs-divider">VS</div>
                <div class="player-box glass">
                    <div class="hp-wrapper"><div id="p2-hp" class="hp-bar" style="width: 100%;"></div></div>
                    <img src="green-dice-1.png" id="dice2" class="dice-img">
                    <p>CPU</p>
                </div>
            </div>

            <div class="status-indicators">
                <div class="stat-pill">🧪 <span id="potion-count">1</span></div>
                <div class="stat-pill">🍀 <span id="luck-count">0</span></div>
                <div class="stat-pill">🛡️ <span id="shield-count">0</span></div>
            </div>

            <div class="action-zone glass">
                <input type="number" id="bet-input" value="10" class="bet-field">
                <div class="btn-group">
                    <button onclick="rollDice('std')" class="btn-std">🎲 Standard</button>
                    <button onclick="rollDice('bsk')" class="btn-bsk">⚡ Berserk</button>
                </div>
                <p class="battle-msg">Ready to Battle?</p>
            </div>
        </section>

        <section id="tab-vault" class="tab-content">
            <div class="card glass bonus-card">
                <h3>🎁 Daily Bonus</h3>
                <button class="claim-btn" onclick="claimDaily()">CLAIM REWARD</button>
            </div>
            
            <h3 class="sec-label">🛒 CONSUMABLES</h3>
            <div class="shop-grid">
                <div class="shop-item glass"><span>🧪 Potion</span><button>200c</button></div>
                <div class="shop-item glass"><span>🍀 Lucky Dice</span><button>300c</button></div>
            </div>

            <h3 class="sec-label">✨ AURA SELECTOR</h3>
            <div class="aura-row">
                <button class="aura-chip active" onclick="setAura('classic')">Classic</button>
                <button class="aura-chip" onclick="setAura('cyber')">Cyber</button>
            </div>
        </section>

        <div id="wallet" class="wallet-bar glass">
            <span>💰 <span id="coins">226</span></span>
            <span>🟡 <span id="tokens">12</span></span>
            <span>✨ <span id="mult">1</span>x</span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
