<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dice Battle Elite</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body id="game-body">

<div id="floating-text-container"></div>

<div class="nav-bar glass" id="game-nav" style="display:none;">
    <button onclick="showTab('arena')">⚔️ Arena</button>
    <button onclick="showTab('vault')">💎 Vault</button>
    <button onclick="showTab('hall')">🏆 Hall</button>
</div>

<div id="home-screen" class="home">
  <h1 class="title">🎲 DICE <span>BATTLE</span></h1>
  <div class="login-box">
    <button class="connect-btn" onclick="handleSimpleLogin()">🚀 Enter Arena</button>
  </div>
</div>

<div id="game-screen" style="display:none;">
  <div class="game-container" id="main-container">
    
    <div id="tab-arena" class="tab-content">
        <div class="game-header">
            <div class="user-stats">
                <span id="display-username">Player</span> 
                <span class="badge-rank" id="rank-tag">NOVICE</span>
                <span class="badge-lvl">LVL <span id="lvl-num">1</span></span>
            </div>
        </div>

        <div id="boss-ability" class="ability-tag" style="display:none;"></div>

        <div class="battle-arena">
            <div class="player-box glass">
                <div class="hp-wrapper"><div id="p1-hp" class="hp-bar"></div></div>
                <div class="dice-space"><img id="dice1" src="./assets/red-1.png"></div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="player-box glass">
                <div class="hp-wrapper"><div id="p2-hp" class="hp-bar"></div></div>
                <div class="dice-space"><img id="dice2" src="./assets/green-1.png"></div>
            </div>
        </div>

        <div class="action-zone">
            <div class="shield-toggle">
                <label><input type="checkbox" id="shield-active"> 🛡️ Use Shield (500c)</label>
            </div>
            <input type="number" id="bet-input" value="10">
            <div class="btn-group">
                <button id="roll-std" class="btn-battle std">🎲 Standard</button>
                <button id="roll-bsk" class="btn-battle bsk">⚡ Berserk</button>
            </div>
        </div>
    </div>

    <div id="tab-vault" class="tab-content" style="display:none;">
        <h2 class="section-title">✨ AURA SELECTOR</h2>
        <div class="theme-grid">
            <button class="btn-theme" onclick="setTheme('default')">🌑 Classic</button>
            <button class="btn-theme" onclick="setTheme('cyberpunk')">🧬 Cyberpunk</button>
            <button class="btn-theme" onclick="setTheme('inferno')">🔥 Inferno</button>
        </div>

        <h2 class="section-title">💎 UPGRADES</h2>
        <div class="shop-grid glass">
            <p>Permanent Upgrades (Tokens Only)</p>
            <button class="btn-shop" onclick="buyPermanent('hp', 10)">❤️ Extra Life (120HP) - 10T</button>
            <button class="btn-shop" onclick="buyPermanent('luck', 25)">🍀 Lucky Charm (+5% 6s) - 25T</button>
            <button class="btn-shop" onclick="buyPermanent('bounty', 50)">💰 Bounty Hunter (2x Tokens) - 50T</button>
        </div>
        <div class="prestige-zone">
            <button class="prestige-btn" id="prestige-btn" onclick="prestige()" style="display:none;">👑 PRESTIGE</button>
        </div>
    </div>

    <div id="tab-hall" class="tab-content" style="display:none;">
        <h2 class="section-title">🏆 HALL OF FAME</h2>
        <div id="hall-list" class="glass list-container">
            </div>
        <h2 class="section-title">⭐ ACHIEVEMENTS</h2>
        <div id="achievement-list" class="glass list-container">
            </div>
    </div>

    <div class="wallet-footer">
      <span>💰 <span id="coins-game">0</span></span>
      <span>🪙 <span id="tokens-game">0</span></span>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
