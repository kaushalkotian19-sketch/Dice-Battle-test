<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dice Battle Elite</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body id="game-body">

<div id="celebration-overlay" class="overlay" style="display:none;">
    <div class="overlay-content">
        <h1 id="celebration-title" class="glow-text">LEVEL UP!</h1>
        <p id="celebration-desc">Level <span id="new-lvl">1</span> reached!</p>
        <button class="connect-btn" onclick="closeOverlay()">CONTINUE</button>
    </div>
</div>

<div id="home-screen" class="home">
  <h1 class="title">🎲 DICE <span>BATTLE</span></h1>
  <div class="login-box">
    <button class="connect-btn daily-btn" onclick="claimDailyReward()">🎁 Daily Chest</button>
    <input type="text" id="username-input" placeholder="Enter Nickname..." maxlength="12">
    <button class="connect-btn" onclick="handleSimpleLogin()">🚀 Enter Arena</button>
  </div>
</div>

<div id="game-screen" style="display:none;">
  <div class="game-container">
    <div class="game-header">
      <div class="user-stats">
          <span id="display-username">Player</span> 
          <span class="badge-rank" id="rank-tag">NOVICE</span>
          <span class="badge-lvl">LVL <span id="lvl-num">1</span></span>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div id="boss-warning" class="boss-alert" style="display:none;">⚠️ BOSS ENCOUNTER ⚠️</div>

    <div class="battle-arena">
      <div class="player-box glass" id="p1-card">
        <div class="hp-wrapper"><div id="p1-hp" class="hp-bar"></div></div>
        <div class="p-label">YOU</div>
        <div class="dice-space" id="p1-dice-container"><img id="dice1" src="./assets/red-1.png"></div>
        <p class="roll-val">Roll: <span id="score1">0</span></p>
      </div>
      <div class="vs-divider">VS</div>
      <div class="player-box glass" id="p2-card">
        <div class="hp-wrapper"><div id="p2-hp" class="hp-bar"></div></div>
        <div class="p-label" id="p2-label">OPPONENT</div>
        <div class="dice-space"><img id="dice2" src="./assets/green-1.png"></div>
        <p class="roll-val">Roll: <span id="score2">0</span></p>
      </div>
    </div>

    <div class="vault-section glass">
        <p class="vault-title">💎 THE VAULT</p>
        <div class="skin-buttons">
            <button class="btn-skin" id="skin-neon" onclick="buySkin('neon', 50000)">💠 Neon</button>
            <button class="btn-skin" id="skin-fire" onclick="buySkin('fire', 250000)">🔥 Fire</button>
        </div>
    </div>

    <div class="status-panel glass">
        <div class="stat">🔥 <span id="win-streak">0</span></div>
        <div class="stat">💀 <span id="boss-count">0</span></div>
        <div class="stat">✨ <span id="multiplier">1x</span></div>
    </div>

    <div class="action-zone">
      <input type="number" id="bet-input" value="10">
      <div class="btn-group">
        <button id="roll-std" class="btn-battle std">🎲 Standard</button>
        <button id="roll-bsk" class="btn-battle bsk">⚡ Berserk</button>
      </div>
    </div>

    <div class="wallet-footer">
      <span>💰 <span id="coins-game">0</span></span>
      <span>🪙 <span id="tokens-game">0</span></span>
      <p id="battle-msg">Ready to Battle?</p>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
