<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dice Battle Elite</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body id="game-body" class="default">

<div id="floating-text-container"></div>

<div class="nav-bar glass" id="game-nav" style="display:none;">
    <button onclick="showTab('arena')">⚔️ Arena</button>
    <button onclick="showTab('vault')">✨ Vault</button>
    <button onclick="showTab('hall')">🏆 Hall</button>
</div>

<div id="home-screen" class="home">
  <h1 class="title">🎲 DICE <span>BATTLE</span></h1>
  <div class="login-box">
    <input type="text" id="nickname-input" placeholder="Enter Nickname..." class="glass-input">
    <button class="connect-btn" onclick="handleSimpleLogin()">🚀 Enter Arena</button>
  </div>
</div>

<div id="game-screen" style="display:none;">
  <div class="main-scroll-area">
    
    <div id="tab-arena" class="tab-content active">
        <div class="user-header">
            <span id="display-username">Player</span> 
            <span class="badge-lvl">LVL <span id="lvl-num">1</span></span>
        </div>

        <div class="battle-arena">
            <div class="player-box glass">
                <div class="hp-wrapper"><div id="p1-hp" class="hp-bar"></div></div>
                <div class="dice-space"><img id="dice1" src="./assets/red-1.png"></div>
                <div class="roll-label">YOU</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="player-box glass">
                <div class="hp-wrapper"><div id="p2-hp" class="hp-bar"></div></div>
                <div class="dice-space"><img id="dice2" src="./assets/green-1.png"></div>
                <div class="roll-label">OPPONENT</div>
            </div>
        </div>

        <div class="action-zone glass">
            <input type="number" id="bet-input" value="10" class="bet-field">
            <div class="btn-group">
                <button class="btn-battle std-premium" onclick="startBattle('std')">🎲 Standard</button>
                <button class="btn-battle bsk-premium" onclick="startBattle('bsk')">⚡ Berserk</button>
            </div>
            <div id="battle-status" class="status-msg">Ready to Battle?</div>
        </div>
    </div>

    <div id="tab-vault" class="tab-content">
        <h3 class="section-label">✨ AURA SELECTOR</h3>
        <div class="aura-grid">
            <button class="aura-card" onclick="setTheme('default')">🌑 Classic</button>
            <button class="aura-card cyber" onclick="setTheme('cyberpunk')">🧬 Cyber</button>
            <button class="aura-card fire" onclick="setTheme('inferno')">🔥 Inferno</button>
        </div>

        <h3 class="section-label">💎 PERMANENT UPGRADES</h3>
        <div class="upgrade-list">
            <div class="upgrade-row">
                <span>❤️ +20 Max HP</span>
                <button class="up-btn" onclick="buyPermanent('hp', 10)">10T</button>
            </div>
        </div>
    </div>

  </div>

  <div class="wallet-bar glass">
    <span>💰 <span id="coins-game">0</span></span>
    <span>🪙 <span id="tokens-game">0</span></span>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
