<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Battle Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="classic-aura">

    <div id="home-screen" class="home-container">
        <div class="glow-layer"></div>
        <div class="dice-icon">🎲</div>
        <h1 class="title">DICE<span>BATTLE</span></h1>
        <p class="tagline">ELITE ARENA</p>
        
        <div class="auth-card glass">
            <input type="text" id="warrior-input" placeholder="Warrior name..." class="elite-input">
            <button id="enter-btn" class="gold-btn">🚀 ENTER ARENA</button>
        </div>

        <div class="system-status">
            <p><span class="online-pulse"></span> Global Server Online</p>
            <p class="dev">Developed by Kaushal Kotian</p>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <nav class="nav-header glass">
            <button class="nav-tab active" data-target="arena">⚔️ Arena</button>
            <button class="nav-tab" data-target="vault">✨ Vault</button>
            <button class="nav-tab" data-target="hall">🏆 Hall</button>
        </nav>

        <div id="view-arena" class="page-view active">
            <div class="player-header">
                <span id="user-display">Warrior</span> <span class="lvl">LVL 27</span>
            </div>

            <div class="battle-floor">
                <div class="fighter-slot glass">
                    <div class="health-bar"><div id="hp-p1" class="fill" style="width:100%"></div></div>
                    <img src="red-dice-1.png" id="p1-dice" class="dice-obj">
                    <p>YOU</p>
                </div>
                <div class="vs-text">VS</div>
                <div class="fighter-slot glass">
                    <div class="health-bar"><div id="hp-p2" class="fill" style="width:100%"></div></div>
                    <img src="green-dice-1.png" id="p2-dice" class="dice-obj">
                    <p>CPU</p>
                </div>
            </div>

            <div class="quick-stats">
                <div class="pill">🧪 <span id="pot-qty">1</span></div>
                <div class="pill">🍀 <span id="luck-qty">0</span></div>
                <div class="pill">🛡️ <span id="shld-qty">0</span></div>
            </div>

            <div class="control-panel glass">
                <input type="number" id="bet-val" value="10" class="bet-box">
                <div class="action-row">
                    <button class="roll-btn std" onclick="battle.start('std')">🎲 Standard</button>
                    <button class="roll-btn bsk" onclick="battle.start('bsk')">⚡ Berserk</button>
                </div>
                <p id="log-msg">Ready to Battle?</p>
            </div>
        </div>

        <footer class="economy-bar glass">
            <div class="stat-item">💰 <span id="coin-val">226</span></div>
            <div class="stat-item">🟡 <span id="token-val">12</span></div>
            <div class="stat-item">✨ <span id="mult-val">1x</span></div>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
