<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dice Battle Elite</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body id="game-body" class="default">

<div id="floating-text-container"></div>

<div class="nav-bar glass" id="game-nav" style="display:none;">
    <button onclick="showTab('arena')">⚔️ Arena</button>
    <button onclick="showTab('vault')">✨ Vault</button>
    <button onclick="showTab('hall')">🏆 Hall</button>
</div>

<div id="home-screen" class="home">
  <h1 class="title">🎲 DICE <span>BATTLE</span></h1>
  <div class="login-box">
    <button class="connect-btn daily-btn" onclick="claimDailyReward()">🎁 Daily Chest</button>
    <input type="text" id="nickname-input" placeholder="Enter Nickname..." class="glass-input">
    <button class="connect-btn" onclick="handleSimpleLogin()">🚀 Enter Arena</button>
  </div>
</div>

<div id="game-screen" style="display:none;">
  <div class="main-scroll-area">
    
    <div id="tab-arena" class="tab-content">
        <div class="user-header">
            <span id="display-username">Player</span> 
            <span class="badge-lvl">LVL <span id="lvl-num">1</span></span>
        </div>

        <div class="battle-arena">
            <div class="player-box glass">
                <div class="hp-wrapper"><div id="p1-hp" class="hp-bar"></div></div>
                <div class="dice-space"><img id="dice1" src="./assets/red-1.png"></div>
                <div class="roll-label">YOU</div>
            </div>
            <div class="vs-divider">VS</div>
            <div class="player-box glass">
                <div class="hp-wrapper"><div id="p2-hp" class="hp-bar"></div></div>
                <div class="dice-space"><img id="dice2" src="./assets/green-1.png"></div>
                <div class="roll-label">OPPONENT</div>
            </div>
        </div>

        <div class="action-zone glass">
            <div class="combat-mods">
                <label class="shield-check"><input type="checkbox" id="shield-active"> 🛡️ Shield (500c)</label>
            </div>
            <input type="number" id="bet-input" value="10" class="bet-field">
            <div class="btn-group">
                <button class="btn-battle std" onclick="startBattle('std')">🎲 Standard</button>
                <button class="btn-battle bsk" onclick="startBattle('bsk')">⚡ Berserk</button>
            </div>
        </div>
    </div>

    <div id="tab-vault" class="tab-content" style="display:none;">
        <h3 class="section-label">✨ AURA SELECTOR</h3>
        <div class="aura-grid">
            <div class="aura-card" onclick="setTheme('default')">🌑 <span>Classic</span></div>
            <div class="aura-card cyber" onclick="setTheme('cyberpunk')">🧬 <span>Cyber</span></div>
            <div class="aura-card fire" onclick="setTheme('inferno')">🔥 <span>Inferno</span></div>
        </div>

        <h3 class="section-label">💎 PERMANENT UPGRADES</h3>
        <div class="upgrade-list">
            <button class="upgrade-row" onclick="buyPermanent('hp', 10)">
                <span>❤️ +20 Max HP</span>
                <span class="up-cost">10T</span>
            </button>
            <button class="upgrade-row" onclick="buyPermanent('luck', 25)">
                <span>🍀 +5% Luck</span>
                <span class="up-cost">25T</span>
            </button>
        </div>
        <button class="prestige-master-btn" id="prestige-btn" onclick="prestige()" style="display:none;">👑 PRESTIGE</button>
    </div>

    <div id="tab-hall" class="tab-content" style="display:none;">
        <h3 class="section-label">🏆 HALL OF FAME</h3>
        <div id="hall-list" class="glass log-container"></div>
    </div>

  </div>

  <div class="wallet-bar glass">
    <span>💰 <span id="coins-game">0</span></span>
    <span>🪙 <span id="tokens-game">0</span></span>
    <span>✨ <span id="multiplier-display">1x</span></span>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
