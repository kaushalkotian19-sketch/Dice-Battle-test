<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Battle Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="classic-aura">

    <div id="home-screen" class="home-container">
        <div class="glow-effect"></div>
        <div class="floating-dice">🎲</div>
        <h1 class="main-title">DICE<span>BATTLE</span></h1>
        <p class="subtitle">ELITE ARENA</p>
        
        <div class="login-card glass">
            <input type="text" id="nickname-input" placeholder="Warrior name..." class="glass-input">
            <button id="enter-btn" class="enter-btn">🚀 ENTER ARENA</button>
        </div>

        <div class="footer-status">
            <p><span class="dot-online"></span> Global Server Online</p>
            <p class="credit">Developed by Kaushal Kotian</p>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <nav class="top-nav glass">
            <button class="nav-item active" data-tab="arena">⚔️ Arena</button>
            <button class="nav-item" data-tab="vault">✨ Vault</button>
            <button class="nav-item" data-tab="hall">🏆 Hall</button>
        </nav>

        <main id="arena-tab" class="content-tab active">
            <div class="header-info">
                <span id="display-name">Warrior</span>
                <span class="lvl-badge">LVL 27</span>
            </div>

            <div class="battle-grid">
                <div class="warrior-box glass" id="player-1">
                    <div class="hp-container"><div id="hp-1" class="hp-fill" style="width:100%"></div></div>
                    <img src="red-dice-1.png" id="dice-left" class="dice-sprite">
                    <p class="label">YOU</p>
                </div>

                <div class="vs-badge">VS</div>

                <div class="warrior-box glass" id="player-2">
                    <div class="hp-container"><div id="hp-2" class="hp-fill" style="width:100%"></div></div>
                    <img src="green-dice-1.png" id="dice-right" class="dice-sprite">
                    <p class="label">CPU</p>
                </div>
            </div>

            <div class="inventory-bar">
                <div class="item">🧪 <span id="pot-val">1</span></div>
                <div class="item">🍀 <span id="luck-val">0</span></div>
                <div class="item">🛡️ <span id="shld-val">0</span></div>
            </div>

            <div class="controls glass">
                <input type="number" id="bet-amount" value="10" class="bet-input">
                <div class="actions">
                    <button class="btn-roll std" onclick="game.roll('standard')">🎲 Standard</button>
                    <button class="btn-roll bsk" onclick="game.roll('berserk')">⚡ Berserk</button>
                </div>
                <p id="battle-log">Ready to Battle?</p>
            </div>
        </main>

        <section id="vault-tab" class="content-tab">
            <div class="daily-card glass">
                <h3>🎁 Daily Bonus</h3>
                <p>Claim free coins every 24h</p>
                <button class="claim-btn">CLAIM REWARD</button>
            </div>
            
            <div class="aura-section">
                <h4>✨ AURA SELECTOR</h4>
                <div class="chip-group">
                    <button class="chip active" onclick="ui.setAura('classic')">Classic</button>
                    <button class="chip" onclick="ui.setAura('cyber')">Cyber</button>
                </div>
            </div>
        </section>

        <footer class="wallet-nav glass">
            <div class="stat">💰 <span id="coin-count">226</span></div>
            <div class="stat">🟡 <span id="token-count">12</span></div>
            <div class="stat">✨ <span id="multi-count">1x</span></div>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
