<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Battle Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="default">

    <div id="home-screen" class="home-container">
        <div class="dice-icon">🎲</div>
        <h1 class="main-title">DICE<span>BATTLE</span></h1>
        <p class="subtitle">ELITE ARENA</p>
        
        <div class="login-card glass">
            <input type="text" id="nickname-input" placeholder="Enter your warrior name..." class="glass-input">
            <button onclick="enterArena()" class="enter-btn">🚀 ENTER ARENA</button>
            <p class="server-status">Global Server Online</p>
        </div>
        <p class="footer-credit">Developed by Kaushal Kotian</p>
    </div>

    <nav id="game-nav" class="nav-bar glass" style="display: none;">
        <button class="nav-btn active" id="btn-arena" onclick="showTab('arena')">⚔️ Arena</button>
        <button class="nav-btn" id="btn-vault" onclick="showTab('vault')">✨ Vault</button>
        <button class="nav-btn" id="btn-hall" onclick="showTab('hall')">🏆 Hall</button>
    </nav>

    <main id="game-screen" style="display: none;">
        <div class="main-scroll-area">
            
            <section id="tab-arena" class="tab-content active">
                <p class="player-tag"><span id="display-username">Warrior</span> <span class="badge">LVL <span id="lvl-num">1</span></span></p>
                
                <div class="battle-arena">
                    <div class="player-box glass">
                        <div class="hp-wrapper"><div id="p1-hp" class="hp-bar" style="width: 100%;"></div></div>
                        <div class="dice-space"><img src="red-dice-1.png" id="p1-img" class="dice-img"></div>
                        <p class="label">YOU</p>
                    </div>
                    <div class="vs-divider">VS</div>
                    <div class="player-box glass">
                        <div class="hp-wrapper"><div id="p2-hp" class="hp-bar" style="width: 100%;"></div></div>
                        <div class="dice-space"><img src="green-dice-1.png" id="p2-img" class="dice-img"></div>
                        <p class="label">CPU</p>
                    </div>
                </div>

                <div class="action-zone glass">
                    <input type="number" id="bet-input" value="10" class="glass-input bet-field">
                    <div class="btn-group">
                        <button onclick="rollDice()" class="btn-battle std-premium">🎲 Standard</button>
                    </div>
                    <p id="battle-status">Ready to Battle?</p>
                </div>
            </section>

            <section id="tab-vault" class="tab-content">
                <h3>✨ AURA SELECTOR</h3>
                <div class="aura-grid">
                    <button class="aura-btn" onclick="setTheme('default')">🌑 Classic</button>
                    <button class="aura-btn cyber" onclick="setTheme('cyber')">🧬 Cyber</button>
                    <button class="aura-btn fire" onclick="setTheme('inferno')">🔥 Inferno</button>
                </div>

                <h3>💎 PERMANENT SHOP</h3>
                <div class="shop-list">
                    <div class="upgrade-row glass">
                        <span>❤️ +20 Max HP</span>
                        <button class="up-btn" onclick="buyPermanent('hp')">10T</button>
                    </div>
                </div>
            </section>

            <section id="tab-hall" class="tab-content">
                <h3>🏆 HALL OF FAME</h3>
                <div id="leaderboard" class="glass"><p>Coming Soon...</p></div>
            </section>
        </div>
    </main>

    <div id="wallet" class="wallet-bar glass" style="display: none;">
        <div class="stat">💰 <span id="coins-game">0</span></div>
        <div class="stat">🟡 <span id="tokens-game">0</span></div>
        <div class="stat">✨ <span id="mult-display">1</span>x</div>
    </div>

    <script src="main.js"></script>
</body>
</html>
